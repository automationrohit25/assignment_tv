name: Playwright E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ui-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run UI tests
        run: npm run test:ui
        env:
          CI: true
        
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }} # Ensures reports are uploaded even if a test fails
        with:
          name: playwright-report
          path: playwright-report/ # Matches the folder name in your playwright.config.ts
          retention-days: 3
          
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run API tests
        run: npm run test:api -- --reporter=list
        env:
          CI: true